# Generated from project template.
# Edit templates/gateway-profiles/codecraft/config.yaml, then resync.
#
# 生产环境安全配置说明（Production Security Hardening）
# =====================================================
#
# 1. 最小权限原则（Least Privilege）
#    - 容器以非 root 用户运行（security_opt: no-new-privileges）
#    - 文件系统只读挂载源码，仅产物目录可写
#    - 网络隔离：默认无外网访问或仅白名单出口
#
# 2. 资源限制（Resource Limits）
#    - CPU: 2 cores, Memory: 4GB, Disk: 10GB
#    - 容器生命周期: 15分钟（防止僵尸容器）
#    - 单次命令超时: 120秒
#
# 3. 数据隔离（Data Isolation）
#    - 源码目录（/src）: 只读挂载（ro 模式）
#    - 产物目录（/workspace）: 可写，映射到主机 ${HERMES_SANDBOX_WORKSPACE}
#    - 临时目录: 容器内 tmpfs，不持久化
#
# 4. 网络安全（Network Security）
#    - 方案A（推荐）: docker_network_mode=none（完全隔离）
#    - 方案B: 自定义bridge网络 + 出站代理白名单
#    - 内网服务通过代理或sidecar访问
#
# 5. 部署前检查清单（Deployment Checklist）
#    □ 确认 HERMES_SANDBOX_WORKSPACE 目录已创建且权限正确
#    □ 确认 SOURCE_CODE_PATH 指向正确的只读源码目录
#    □ 确认 Docker daemon 已启动（rootless 或 rootful）
#    □ 测试网络隔离: docker run --rm --network none alpine:latest ping -c 1 8.8.8.8（应失败）
#    □ 配置日志审计: 启用 gateway 日志的 DEBUG 级别
#    □ 定期清理: 设置定时任务清理 /tmp/hermes-workspace 旧文件

verbose: 1

# 群聊会话策略：同一群（含话题/线程维度）共享上下文，不按发言人拆分 session
group_sessions_per_user: false
thread_sessions_per_user: false

platforms:
  api_server:
    enabled: true
    extra:
      host: 0.0.0.0
      port: 8646
      key: "${API_KEY}"
  telegram:
    enabled: true
    token: "${TELEGRAM_BOT_TOKEN}"
    extra:
      # 群里只在触发条件满足时回复：@bot、回复 bot、/命令
      require_mention: true
      # 留空表示没有“全量自动回复”群，避免每条消息都回
      free_response_chats: []

model:
  # default: gpt-5.2-codex
  # provider: custom
  # base_url: "${CODECRAFT_BASE_URL}"
  # api_key: "${THIRD_PARTY_API_KEY}"
  # api_mode: chat_completions
  default: kimi-k2.5
  provider: opencode-go

memory:
  memory_enabled: true
  backend: sqlite
  user_profile_enabled: true
  nudge_interval: 3

session_search:
  # 默认仅在当前会话 lineage 内检索，避免串群回忆
  scope: current

platform_toolsets:
  api_server:
    - terminal
    - process
    - file
    - web
    - memory
    - skills_list

terminal:
  backend: docker
  cwd: /workspace
  timeout: 120
  lifetime_seconds: 900
  docker_image: python:3.11-slim
  container_cpu: 2
  container_memory: 4096
  container_disk: 10240
  container_persistent: false
  persistent_shell: false
  docker_mount_cwd_to_workspace: false
  
  # ==================== Docker 配置说明 ====================
  #
  # docker_volumes: 宿主机目录映射到容器
  #   - 格式: "host_path:container_path[:ro]"
  #   - 变量展开仅支持 ${VAR} 语法，不支持 ${VAR:-default}
  #   - 确保 host_path 在宿主机上已存在
  #
  # docker_env: 注入到容器内的环境变量（agent 可通过 os.environ 读取）
  #
  # 下方安全选项（cap_drop/cap_add/tmpfs/security_opts/log_opts）由
  # Hermes 代码硬编码管理，config 中填写无效，仅作注释参考。
  
  docker_volumes:
    - "/tmp/hermes-workspace:/workspace"
    # - "/path/to/source:/src:ro"  # 取消注释并配置实际源码路径
  
  # 环境变量（Environment Variables）
  docker_env:
    TZ: "Asia/Shanghai"
    PYTHONDONTWRITEBYTECODE: "1"
    PYTHONUNBUFFERED: "1"
    # 代理配置（如需受控外网访问，取消下方注释）
    # HTTP_PROXY: "http://proxy.example.com:8080"
    # HTTPS_PROXY: "http://proxy.example.com:8080"
    # NO_PROXY: "localhost,127.0.0.1,.internal"

# ==================== 部署后验证命令 ====================
# 
# 1. 验证容器隔离:
#    docker run --rm --network none alpine:latest ping -c 1 8.8.8.8
#    # 期望: ping: bad address '8.8.8.8'
#
# 2. 验证只读挂载:
#    docker run --rm -v /path/to/code:/src:ro alpine:latest touch /src/test
#    # 期望: touch: /src/test: Read-only file system
#
# 3. 验证资源限制:
#    docker stats <container_id>
#    # 检查 CPU 和内存限制是否生效
#
# 4. 验证非 root 运行:
#    docker exec <container_id> id
#    # 期望: uid=1000 gid=1000
#
# 5. 检查 capabilities:
#    docker exec <container_id> capsh --print
#    # 检查当前 capabilities 集合
