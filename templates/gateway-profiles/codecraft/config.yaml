verbose: 1

platforms:
  api_server:
    enabled: true
    extra:
      host: 0.0.0.0
      port: 8646
      key: "${API_KEY}"

model:
  # default: gpt-5.2-codex
  # provider: custom
  # base_url: "${CODECRAFT_BASE_URL}"
  # api_key: "${THIRD_PARTY_API_KEY}"
  # api_mode: chat_completions
  default: kimi-k2.5
  provider: opencode-go

memory:
  memory_enabled: true
  backend: sqlite
  user_profile_enabled: true
  nudge_interval: 3

platform_toolsets:
  api_server:
    - terminal
    - process
    - file
    - web
    - memory
    - skills_list
