verbose: 1

platforms:
  api_server:
    enabled: true
    extra:
      host: 0.0.0.0
      port: 8644
      key: "${API_KEY}"

model:
  default: minimax-m2.7
  provider: opencode-go

memory:
  memory_enabled: true
  backend: sqlite
  user_profile_enabled: true
  nudge_interval: 3

platform_toolsets:
  api_server:
    - browser
    - memory
    - skills_list
