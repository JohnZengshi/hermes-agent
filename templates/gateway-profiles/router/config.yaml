display:
  skin: slate

platforms:
  api_server:
    enabled: true
    extra:
      host: 0.0.0.0
      port: 8645
      key: "${ROUTER_API_KEY}"
      router:
        default_backend: hermes
        backends:
          hermes:
            model_id: hermes-agent
            base_url: http://127.0.0.1:8643
            api_key: "${HERMES_BACKEND_API_KEY}"
          doubao:
            model_id: doubao-agent
            base_url: http://127.0.0.1:8644
            api_key: "${DOUBAO_BACKEND_API_KEY}"
          codecraft:
            model_id: codecraft-agent
            base_url: http://127.0.0.1:8646
            api_key: "${CODECRAFT_BACKEND_API_KEY}"
          flora:
            model_id: flora-agent
            base_url: http://127.0.0.1:8647
            api_key: "${FLORA_BACKEND_API_KEY}"
