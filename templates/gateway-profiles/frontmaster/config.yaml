# Generated from project template.
# Edit templates/gateway-profiles/frontmaster/config.yaml, then resync.

verbose: 1

# 群聊会话策略：同一群（含话题/线程维度）共享上下文，不按发言人拆分 session
group_sessions_per_user: false
thread_sessions_per_user: false

platforms:
  api_server:
    enabled: true
    extra:
      host: 0.0.0.0
      port: 8648
      key: "${API_KEY}"
  telegram:
    enabled: true
    token: "${TELEGRAM_BOT_TOKEN}"
    extra:
      # 群里只在触发条件满足时回复：@bot、回复 bot、/命令
      require_mention: true
      # 留空表示没有“全量自动回复”群，避免每条消息都回
      free_response_chats: []

model:
  default: gpt-5.3-codex
  provider: custom
  base_url: "${THIRD_PARTY_BASE_URL}"
  api_key: "${THIRD_PARTY_API_KEY}"
  # default: kimi-k2.5
  # provider: opencode-go

memory:
  memory_enabled: true
  backend: sqlite
  user_profile_enabled: true
  nudge_interval: 3

session_search:
  # 默认仅在当前会话 lineage 内检索，避免串群回忆
  scope: current

platform_toolsets:
  api_server:
    - terminal
    - process
    - file
    - web
    - memory
    - skills_list

terminal:
  backend: local
  # 实际执行目录：优先使用环境变量 MESSAGING_CWD（适合网关/机器人场景）
  # 例如：MESSAGING_CWD=/Users/littleflower/workspaces/frontmaster
  cwd: "${MESSAGING_CWD}"
  timeout: 120
  persistent_shell: false
